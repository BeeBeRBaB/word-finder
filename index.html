<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Themed Word Finder</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1d2f3a">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <div id="hdr">
    <div><div id="kicker">THEMED WORD FINDER</div><div id="theme">Loading…</div></div>
    <button id="newbtn" type="button">&#8635; New theme</button>
  </div>
  <div id="main">
    <div id="gridbox"><div id="pills"></div><div id="letters"></div><div id="fx"></div></div>
    <div id="side">
      <div id="listhdr"><b>WORDS</b><span id="count"></span></div>
      <div id="list"></div>
      <div id="hint">Drag across a word in the grid to find it, then tap it here to cross it out.</div>
    </div>
  </div>
</div>
<div id="win"><div id="wincard">
  <button id="winclose" type="button" aria-label="Close">&times;</button>
  <div class="big">&#127881;</div><h2>Puzzle solved!</h2><p id="winmsg"></p>
  <button id="winbtn" type="button">Play a new theme &#8594;</button>
</div></div>
<div id="confirm"><div id="confirmcard">
  <p>Start a new puzzle? Your progress will be lost.</p>
  <div><button id="confirm-cancel" type="button">Cancel</button>
  <button id="confirm-ok" type="button">New puzzle</button></div>
</div></div>
<script type="module" src="src/main.js"></script>
</body>
</html>
